<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TTFL – Injury Report RotoWire</title>
<style>
  :root{--bg:#f5f7fb;--card:#fff;--line:#d9e0ea;--text:#1f2937;--muted:#6b7280;--primary:#0f766e;--primary-2:#115e59;--radius:14px}
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;color:var(--text);background:var(--bg);padding:16px}
  h1{margin:0 0 4px;font-size:26px}
  .sub{color:var(--muted);margin-bottom:20px;font-size:14px}
  .sub a{color:var(--primary);font-weight:700;text-decoration:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .injury-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .injury-header h2{margin:0;font-size:18px}
  .updated{font-size:12px;color:var(--muted)}
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{background:#f8fafc;position:sticky;top:0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);z-index:1}
  tr:last-child td{border-bottom:none}
  .badge-dtd{background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .badge-out{background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .badge-prob{background:#dcfce7;color:#166534;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .badge-other{background:#e5e7eb;color:#374151;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .desc{font-size:12px;color:var(--muted);max-width:360px;white-space:normal}
  .loader{text-align:center;padding:30px;color:var(--muted);font-size:14px}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
  button{min-height:40px;padding:8px 16px;border:0;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
  button:hover{background:var(--primary-2)}
</style>
</head>
<body>

<h1>🚑 Injury Report RotoWire</h1>
<div class="sub">
  Joueurs blessés dans votre liste TTLF &nbsp;·&nbsp;
  <a href="index.html">← Retour aux Picks</a>
  &nbsp;·&nbsp;
  <a href="injuries.html">→ Injury Report ESPN</a>
</div>

<div class="card">
  <div class="injury-header">
    <h2>Blessés actifs</h2>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="updated" id="updatedAt">Chargement…</span>
      <button onclick="loadInjuries()">🔄 Actualiser</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Joueur</th><th>Équipe</th><th>Statut</th><th>Blessure</th><th>Détail</th></tr>
      </thead>
      <tbody id="injuryRows"><tr><td colspan="5" class="loader">Chargement…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const INJURIES_URL = 'https://raw.githubusercontent.com/Erwandeluxe/TTLF-PICKS/main/injuries_rotowire.json';

async function loadInjuries() {
  const tbody = document.getElementById('injuryRows');
  tbody.innerHTML = '<tr><td colspan="5" class="loader">Chargement…</td></tr>';
  try {
    const res = await fetch(INJURIES_URL + '?t=' + Date.now());
    const data = await res.json();
    document.getElementById('updatedAt').textContent = 'Mis à jour : ' + (data.updated_at || '—');
    if (!data.injuries || data.injuries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">✅ Aucun blessé dans votre liste actuellement.</td></tr>';
      return;
    }
    tbody.innerHTML = data.injuries.map(p => {
      const status = p.status || '?';
      let cls = 'badge-other';
      if (/out/i.test(status)) cls = 'badge-out';
      else if (/day.to.day/i.test(status)) cls = 'badge-dtd';
      else if (/probable/i.test(status)) cls = 'badge-prob';
      return `<tr>
        <td><strong>${p.name}</strong></td>
        <td>${p.team || '—'}</td>
        <td><span class="${cls}">${status}</span></td>
        <td>${p.description || '—'}</td>
        <td class="desc">${p.return_date || '—'}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#dc2626;padding:20px">❌ Impossible de charger les données.</td></tr>';
  }
}

loadInjuries();
</script>
</body>
</html>
