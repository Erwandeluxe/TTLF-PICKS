<!DOCTYPE html>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TTFL Picks</title>
<style>
  :root{--bg:#f5f7fb;--card:#fff;--line:#d9e0ea;--text:#1f2937;--muted:#6b7280;--primary:#0f766e;--primary-2:#115e59;--ok:#dcfce7;--warn:#fef3c7;--err:#fee2e2;--radius:14px}
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;color:var(--text);background:var(--bg);padding:16px}

  /* SPLASH */
  #splashScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
  .splash-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:48px 36px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.07);text-align:center}
  .splash-box h1{margin:0 0 8px;font-size:28px}
  .splash-box p{color:var(--muted);font-size:14px;margin:0 0 32px;line-height:1.6}
  .splash-box button{width:100%;min-height:48px;background:var(--primary);color:#fff;border:0;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s}
  .splash-box button:hover{background:var(--primary-2)}
  .splash-box .btn-injury{margin-top:12px;background:#fff;color:var(--primary);border:2px solid var(--primary)}
  .splash-box .btn-injury:hover{background:#f0fdf9}

  /* APP */
  #app{display:none}
  h1{margin:0 0 4px;font-size:26px}
  .sub{color:var(--muted);margin-bottom:18px;font-size:14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .card h2{margin:0 0 14px;font-size:18px}
  .field{margin-bottom:12px}
  label{display:block;font-weight:700;margin-bottom:5px;font-size:13px}
  select{width:100%;min-height:44px;padding:10px 12px;border:1px solid #c7d2de;border-radius:10px;font-size:15px;background:#fff}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  button{min-height:44px;padding:10px 16px;border:0;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
  button:hover{background:var(--primary-2)}
  .ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
  .ghost:hover{background:#f8fafc}
  .status{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:14px;display:none}
  .status.ok{background:var(--ok);display:block}
  .status.err{background:var(--err);display:block}

  /* TABLEAU DÉTAIL */
  .toolbar{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:12px;align-items:end}
  .toolbar button{width:100%}
  .table-wrap{max-height:60vh;overflow:auto;border:1px solid var(--line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{background:#f8fafc;position:sticky;top:0;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);z-index:1}
  .team-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .pick-pill{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--warn);font-size:11px;font-weight:700}
  .small{font-size:12px;color:var(--muted);margin-top:8px}
  .loader{text-align:center;padding:30px;color:var(--muted);font-size:14px}

  /* TABLEAU RÉCAP CROISÉ */
  .recap-section{margin-top:20px}
  .recap-section h2{font-size:18px;margin:0 0 12px}
  .recap-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
  .recap-table{border-collapse:collapse;font-size:12px;min-width:100%}
  .recap-table th{background:#f8fafc;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);white-space:nowrap;position:sticky;top:0;z-index:2}
  .recap-table th.member-col{position:sticky;left:0;z-index:3;background:#f8fafc}
  .recap-table td{padding:7px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:middle;white-space:nowrap}
  .recap-table td.member-cell{font-weight:700;font-size:12px;position:sticky;left:0;background:#fff;z-index:1;border-right:2px solid var(--line)}
  .recap-table tr:last-child td{border-bottom:none}
  .player-tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
  .empty-cell{color:#d1d5db;font-size:18px;text-align:center}

  @media(max-width:800px){.grid,.toolbar{grid-template-columns:1fr}}
</style>

function formatDate(d) {
  if (!d) return '';
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) {
    const [day, month, year] = d.split('/');
    const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return `${parseInt(day)} ${months[parseInt(month)-1]} ${year}`;
  }
  try {
    const dt = new Date(d);
    if (!isNaN(dt)) {
      const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
      return `${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
    }
  } catch(e) {}
  return d;
}

function teamBadge(team) {
  const c = TEAM_COLORS[team] || ['#6b7280','#fff'];
  return `<span class="team-badge" style="background:${c[0]};color:${c[1]}">${team}</span>`;
}

function playerTag(player, team) {
  const c = TEAM_COLORS[team] || ['#6b7280','#fff'];
  return `<span class="player-tag" style="background:${c[0]};color:${c[1]}">${player}</span>`;
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  if (type === 'ok') setTimeout(() => el.className = 'status', 2500);
}

function updatePlayersList() {
  const team = document.getElementById('team').value;
  const sel  = document.getElementById('player');
  if (!team) { sel.innerHTML = "<option value=''>— Choisis d'abord une équipe —</option>"; return; }
  const list = (PLAYERS[team] || []).sort((a,b) => a.localeCompare(b,'fr'));
  sel.innerHTML = "<option value=''>Choisir un joueur</option>";
  list.forEach(p => { const o = document.createElement('option'); o.value = o.textContent = p; sel.appendChild(o); });
}

const ROUNDS_ORDER = Object.keys(ROUNDS_MAP);
let allPicks = [];

function renderTable() {
  const fr = document.getElementById('filterRound').value;
  const fm = document.getElementById('filterMember').value;
  let data = allPicks.filter(x => (!fr || x.round === fr) && (!fm || x.member === fm));
  data.sort((a,b) => (ROUNDS_ORDER.indexOf(b.round) - ROUNDS_ORDER.indexOf(a.round)) || a.member.localeCompare(b.member,'fr'));
  const tbody = document.getElementById('rows');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#6b7280;padding:20px">Aucun pick pour ce filtre.</td></tr>';
  } else {
    tbody.innerHTML = data.map(x =>
      `<tr>
        <td>${formatDate(x.date)}</td>
        <td><span class="pick-pill">${x.round}</span></td>
        <td><strong>${x.member}</strong></td>
        <td>${teamBadge(x.team)}</td>
        <td>${x.player}</td>
      </tr>`
    ).join('');
  }
  document.getElementById('count').textContent = `${data.length} pick(s) affiché(s) sur ${allPicks.length} total`;
}

function renderRecap() {
  const usedRounds = ROUNDS_ORDER.filter(r => allPicks.some(p => p.round === r));
  const head = document.getElementById('recapHead');
  head.innerHTML = '<tr><th class="member-col">Joueur</th>' +
    usedRounds.map(r => `<th>${r}<br><span style="font-weight:400;font-size:10px">${ROUNDS_MAP[r]}</span></th>`).join('') +
    '</tr>';
  const body = document.getElementById('recapBody');
  if (!usedRounds.length) {
    body.innerHTML = '<tr><td colspan="2" style="color:#6b7280;padding:20px">Aucun pick enregistré.</td></tr>';
    return;
  }
  const idx = {};
  allPicks.forEach(p => { idx[p.member + '|' + p.round] = p; });
  body.innerHTML = MEMBERS.map(m => {
    const cells = usedRounds.map(r => {
      const p = idx[m + '|' + r];
      if (!p) return `<td class="empty-cell">–</td>`;
      return `<td>${playerTag(p.player, p.team)}</td>`;
    }).join('');
    return `<tr><td class="member-cell">${m}</td>${cells}</tr>`;
  }).join('');
}

async function loadPicks() {
  document.getElementById('rows').innerHTML = '<tr><td colspan="5" class="loader">Chargement…</td></tr>';
  document.getElementById('recapBody').innerHTML = '<tr><td colspan="2" class="loader">Chargement…</td></tr>';
  try {
    const res  = await fetch(SCRIPT_URL + '?action=data', { cache: 'no-store' });
    const json = await res.json();
    allPicks = json.picks || [];
    renderTable();
    renderRecap();
  } catch(e) {
    document.getElementById('rows').innerHTML = '<tr><td colspan="5" style="color:#dc2626;padding:20px">❌ Impossible de charger les données.</td></tr>';
  }
}

async function post(action, payload) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...payload })
  });
  return res.json();
}

document.getElementById('team').addEventListener('change', updatePlayersList);
document.getElementById('filterRound').addEventListener('change', renderTable);
document.getElementById('filterMember').addEventListener('change', renderTable);

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('filterRound').value = '';
  document.getElementById('filterMember').value = '';
  renderTable();
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const member = document.getElementById('member').value;
  const round  = document.getElementById('round').value;
  const team   = document.getElementById('team').value;
  const player = document.getElementById('player').value;
  if (!member || !round || !team || !player) { setStatus('Tous les champs sont requis.', 'err'); return; }
  const out = await post('savePick', { member, round, team, player });
  if (out.error) { setStatus('Erreur : ' + out.error, 'err'); return; }
  await loadPicks();
  setStatus('✅ Pick enregistré !', 'ok');
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  const member = document.getElementById('member').value;
  const round  = document.getElementById('round').value;
  if (!member || !round) { setStatus('Choisis une personne et une date.', 'err'); return; }
  const out = await post('deletePick', { member, round });
  if (out.error) { setStatus('Erreur : ' + out.error, 'err'); return; }
  await loadPicks();
  setStatus('🗑 Pick supprimé.', 'ok');
});

document.getElementById('reloadBtn').addEventListener('click', async () => {
  await loadPicks();
  setStatus('🔄 Données actualisées.', 'ok');
});
</script>
</body>
</html>
