name: Fetch Injuries RotoWire

on:
  schedule:
    - cron: '0 5 * * *'    # 07h00 France
    - cron: '0 10 * * *'   # 12h00 France
    - cron: '0 16 * * *'   # 18h00 France
    - cron: '0 18 * * *'   # 20h00 France
    - cron: '0 21 * * *'   # 23h00 France
    - cron: '45 21 * * *'  # 23h45 France
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch injuries RotoWire
        run: python fetch_injuries_rotowire.py

      - name: Commit injuries_rotowire.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add injuries_rotowire.json
          git diff --staged --quiet || git commit -m "chore: update RotoWire injury report"
          git push
