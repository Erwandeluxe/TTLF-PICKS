name: Fetch Injuries

on:
  schedule:
    - cron: '0 16 * * *'   # 18h heure France (UTC+2)
    - cron: '0 21 * * *'   # 23h heure France (UTC+2)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch injuries
        run: python fetch_injuries.py

      - name: Commit injuries.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add injuries.json
          git diff --staged --quiet || git commit -m "chore: update injury report"
          git push
