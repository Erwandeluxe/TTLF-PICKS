name: Update Injury Report

on:
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  update-injuries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch injuries
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_injuries.py

      - name: Commit injuries.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add injuries.json
          git diff --staged --quiet || git commit -m "chore: update injury report"
          git push
